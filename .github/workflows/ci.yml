name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Type check (mypy)
        run: mypy sql_ops_agent

      - name: Tests (pytest)
        run: pytest -q

      - name: Run Eval Harness (Smoke)
        # We assume dependencies are installed. The harness uses a MockLLM so it should pass.
        run: python sql_ops_agent/eval/harness.py

      - name: Build Docker Image
        run: docker build -f infra/Dockerfile .
